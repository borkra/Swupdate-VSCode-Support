name: Publish Extension Release

run-name: "Publish Release — v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example, 1.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version
        id: resolve-version
        run: |
          version="${{ inputs.version }}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout, bump version and build
        id: build
        uses: ./.github/actions/build
        with:
          version: ${{ steps.resolve-version.outputs.version }}

      - name: Publish GitHub release with VSIX
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.resolve-version.outputs.version }}" \
            swupdate-lang.vsix \
            --target "${{ steps.build.outputs.commit_sha }}" \
            --generate-notes
