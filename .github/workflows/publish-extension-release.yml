name: Publish Extension Release

run-name: "Publish Release — v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example, 1.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Validate version
        id: resolve-version
        run: |
          version="${{ inputs.version }}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout
        run: |
          gh auth setup-git
          git clone --depth=1 "https://github.com/${{ github.repository }}.git" .

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit and push
        run: |
          node scripts/update-version.js "${{ steps.resolve-version.outputs.version }}"
          git add -A
          git diff --staged --quiet || git commit -m "chore(release): v${{ steps.resolve-version.outputs.version }}"
          git push origin HEAD

      - name: Build extension
        uses: ./.github/actions/build

      - name: Publish GitHub release with VSIX
        run: |
          gh release create "v${{ steps.resolve-version.outputs.version }}" \
            *.vsix \
            --target "$(git rev-parse HEAD)" \
            --generate-notes
