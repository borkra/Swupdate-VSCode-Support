name: Build Extension Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - CHANGELOG.md
      - package.json
      - package-lock.json
      - tsconfig.json
      - tslint.json
      - language-configuration.json
      - .vscodeignore
      - scripts/**
      - syntaxes/**
      - media/**
      - client/package.json
      - client/tsconfig.json
      - client/src/**
      - server/package.json
      - server/tsconfig.json
      - server/src/**
  pull_request:
    branches:
      - main
    paths:
      - README.md
      - CHANGELOG.md
      - package.json
      - package-lock.json
      - tsconfig.json
      - tslint.json
      - language-configuration.json
      - .vscodeignore
      - scripts/**
      - syntaxes/**
      - media/**
      - client/package.json
      - client/tsconfig.json
      - client/src/**
      - server/package.json
      - server/tsconfig.json
      - server/src/**

jobs:
  build-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Set up, install and build
        uses: ./.github/actions/build

      - name: Package VSIX
        run: npx @vscode/vsce package --no-yarn --out swupdate-lang.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: swupdate-lang-vsix
          path: swupdate-lang.vsix
          if-no-files-found: error
