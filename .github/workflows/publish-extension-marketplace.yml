name: Publish VS Code Marketplace Extension

run-name: "Publish to Marketplace — ${{ inputs.release_tag }}"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to publish (for example, v1.0.0)
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-marketplace:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: tag
        run: |
          raw="${{ inputs.release_tag }}"
          tag="${raw#v}"
          echo "release_tag=v$tag" >> "$GITHUB_OUTPUT"

      - name: Download VSIX from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ steps.tag.outputs.release_tag }}" --repo "${{ github.repository }}" --pattern "*.vsix"

      - name: Validate marketplace token
        run: |
          if [ -z "${{ secrets['VSCE_PAT'] }}" ]; then
            echo "Missing marketplace token. Set repository secret VSCE_PAT."
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-yarn swupdate-lang.vsix
        env:
          VSCE_PAT: ${{ secrets['VSCE_PAT'] }}

      - name: Publish to Open VSX Registry
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish swupdate-lang.vsix
        env:
          OVSX_PAT: ${{ secrets['OVSX_PAT'] }}
