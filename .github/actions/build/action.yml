name: Set up, install and build
description: Set up Node.js, install npm dependencies, and build the extension

runs:
  using: composite

  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install
      shell: bash

    - name: Build extension
      run: npm run compile && npm run bundle
      shell: bash

    - name: Package VSIX
      run: npx @vscode/vsce package --no-yarn --out swupdate-lang.vsix
      shell: bash
