name: Set up, install and build
description: Checkout, set up Node.js, install npm dependencies, and build the extension

inputs:
  ref:
    description: Git ref to checkout (tag, branch, SHA). Leave empty for default HEAD.
    required: false
    default: ''

runs:
  using: composite

  steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install
      shell: bash

    - name: Build extension
      run: npm run compile && npm run bundle
      shell: bash
